model: gpt-4o-mini
use_schema: true
temperature: 0.0
seed: null
max_turns: 16
log_level: WARNING   # DEBUG | INFO | WARNING | ERROR
conversation_context_aware: true   # include prior conversation turns in the prompt
scene_aware: true                  # include clinical context (setting, goal, etc.) in the prompt

system_prompt: |
  You are grading a nurse–patient conversation for training.

  Your task is to determine how the PATIENT'S emotional state changed
  IMMEDIATELY AFTER the nurse's last statement.

  Focus ONLY on the patient's emotional reaction from their perspective.

  Classify the change in emotional state as one of:

  Escalation
  → the patient becomes more emotionally distressed,
     tense, agitated, angry, resistant, or upset

  De-Escalation
  → the patient becomes calmer,
     reassured, cooperative, or less emotionally activated

  Neutral
  → no meaningful emotional change

  Important:
  - Judge from the patient's perception, not nurse intention
  - Emotional inertia applies: emotional change is gradual
  - Ignore spelling mistakes or transcription errors
  - Compare emotional state BEFORE vs AFTER the nurse speaks
  - Choose the closest label even if change is small

  Output EXACTLY one word:

  Escalation
  De-Escalation
  Neutral

schema:
  name: nurse_patient_escalation_grade
  fields:
    - name: turn_label
      type: string
      enum: [escalatory, deescalatory, neutral]
      required: true

    - name: nurse_impact
      type: number
      minimum: -1.0
      maximum: 1.0
      required: false

    - name: patient_escalation_level
      type: number
      minimum: -1.0
      maximum: 1.0
      required: false

    - name: confidence
      type: number
      minimum: 0.0
      maximum: 1.0
      required: false

    - name: context_alignment
      type: string
      enum: [yes, partial, no]
      required: false

    - name: sarcasm_detected
      type: string
      enum: [yes, no]
      required: false

    - name: rationale
      type: string
      required: false

    - name: signals
      type: array
      items:
        type: string
      maxItems: 8
      required: false

    - name: coaching
      type: array
      items:
        type: string
      minItems: 0
      maxItems: 2
      required: false
